services:
  - type: worker
    name: teleclone-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: SOURCE_ID
        sync: false
      - key: DEST_ID
        sync: false
      - key: DELAY
        value: "2.0"
      - key: MAX_RETRIES
        value: "3"
      - key: PIN_ENABLED
        value: "true"
      - key: PIN_INTERVAL
        value: "2000"
      - key: CAPTION_ADD_START
        sync: false
      - key: CAPTION_ADD_END
        sync: false
      - key: CAPTION_REPLACE
        sync: false
      - key: CAPTION_REMOVE
        sync: false
      - key: CAPTION_REMOVE_LINES
        sync: false